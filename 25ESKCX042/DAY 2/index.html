<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  

    <div class="card">

      <h1>Registration Form</h1>

      <form>

        
        
        <div class="field">
          <label for="txtEmail">Email Address</label>
          <input type="email" id="txtEmail" placeholder="Enter email address" required>
        </div>

        
        <div class="field">
          <label for="txtPassword">Password <span class="optional">(optional)</span></label>
          <input type="password" id="txtPassword" placeholder="Enter your password">
          <p class="hint">Password should be at least 15 characters, OR at least 8 characters including a number and a lowercase letter.</p>
        </div>

        
        <div class="row">
          <div class="field">
            <label for="txtPhone">Phone Number</label>
            <input type="tel" id="txtPhone" placeholder="Enter phone number" required>
          </div>
          <div class="field">
            <label for="dob">Birth Date</label>
            <input type="date" id="dob">
          </div>
        </div>

        
        <div class="field">
          <label>Gender</label>
          <div class="radio-group">
            <input type="radio" id="male" name="gender" checked>
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender">
            <label for="female">Female</label>

            <input type="radio" id="prefer" name="gender">
            <label for="prefer">Prefer not to say</label>
          </div>
        </div>

        
        <div class="field">
          <label>Address</label>

          <input type="text" placeholder="Enter street address">
          <input type="text" placeholder="Enter street address line 2">

          
          <div class="row">
            <div class="field">
              <select>
                <option value="">Select below</option>
                <option value="india">India</option>
                <option value="pakistan">pakistan</option>
                <option value="iran">iran</option>
                <option value="canada">Canada</option>
                <option value="austria">austria</option>
                <option value="germany">Germany</option>
              </select>
            </div>
            <div class="field">
              <input type="text" required placeholder="Enter your city">
            </div>
          </div>

          
          <div class="row">
            <div class="field">
              <input type="text" placeholder="Enter your region">
            </div>
            <div class="field">
              <input type="text" placeholder="Enter postal code">
            </div>
          </div>

        </div>

       
        <button type="submit">Submit</button>

      </form>

    </div>
  </div>

</body>
</html>
