<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 6 - Live User Directory | Fetch API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
 
    <div class="text-center mb-4">
        <h2>Live User Directory</h2>
        <p class="text-muted">
            Day 6 &mdash; From Hardcoded Data to Live Data. Every user below is
            fetched live from <code>jsonplaceholder.typicode.com/users</code>.
        </p>
        <input type="text" id="searchBox" class="form-control w-50 mx-auto mb-2" placeholder="Search user by name...">
        <button id="sortBtn" class="btn btn-sm btn-outline-primary">Sort A&ndash;Z</button>
    </div>
 
    <h6 id="userCount" class="text-center text-muted mb-3"></h6>
 
    <div id="statusMsg" class="text-center mb-3"></div>
 
    <div class="row g-4" id="userContainer"></div>
 
</div>
 
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="script.js"></script>
</body>
</html>
