<!DOCTYPE html>
<head>
<link rel = "stylesheet" href="calculator.css">
</head>
<body>
    <h1>Calculator</h1>
    <form>
        <input type="text" id="number1" placeholder="enter first number">
        <input type="text" id="number2" placeholder="enter second number">
        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>
        <button type="button" onclick="perfromarithemeitcoperations()">
            arthmetic operation
        </button>
        <div id="result">result</div>
    </form>

    <script>
        function perfromarithemeitcoperations() {
            let var1 = 10 ; /* scopes define karta hai , isko redeclare nhi kar skte hai  */
            const pi=3.14; /* constant define karta hai */
            var var2=20; /* block ke bhar bhi define ho skta hai */
            var2; /* gives error , its not used aftter 2015 , its a global variable */ 
             const number1= parseFloat(document.getElementById("number1").value)
             const number2 = parseFloat(document.getElementById("number2").value)
             const operator =document.getElementById("operator").value;
             let result=0;
             switch(operator)
             {
                case "+" : 
                result=number1+number2;
                break;
                case "-":
                    result=number1-number2;
                    break;
                case "*":
                    result=number1*number2;
                    break;
                case "/":
                    if(number2==0){
                        result= "cannot divide by zero" ;
                    }
                    else {
                    result = number1/ number2;
                    }
                    break;
             }
                 const resultDiv = document.getElementById("result");
                resultDiv.innerHTML = result; 
       
        }
      

    </script>
</body>
