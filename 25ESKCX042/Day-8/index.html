<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Employee Onboarding</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5 mb-5">
        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white">
                <h3 class="text-center mb-0">Employee Onboarding Form</h3>
            </div>
            <div class="card-body">
                <div id="errorBox"></div>
                <form action="success.php" method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Full Name</label>
                            <input type="text" name="name" id="name" class="form-control" required placeholder="John Doe">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Contact Number</label>
                            <input type="text" name="phone" class="form-control" required placeholder="Enter phone number">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Work Email</label>
                            <input type="email" name="email" class="form-control" required placeholder="john@company.com">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Start Date</label>
                            <input type="date" name="start_date" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Department</label>
                            <select name="department" class="form-select">
                                <option value="Engineering">Engineering</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Human Resources">Human Resources</option>
                                <option value="Sales">Sales</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Shift Preference</label><br>
                            <input type="radio" name="shift" value="Morning" required> Morning
                            <input type="radio" name="shift" value="Evening" class="ms-2"> Evening
                        </div>
                        <div class="col-12 mb-3">
                            <label>Home Address</label>
                            <textarea name="address" id="address" rows="3" class="form-control" placeholder="Enter full address"></textarea>
                        </div>
                        <div class="col-md-12 mb-4">
                            <label>Upload Resume (PDF)</label>
                            <input type="file" id="resume" class="form-control">
                            <small id="fileName" class="text-muted">No file selected</small>
                        </div>
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-dark px-5 py-2">Submit Employee Details</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
